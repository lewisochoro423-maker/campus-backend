<!DOCTYPE html>  <html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Campus Marketplace & Textbook Exchange</title>  
    <style>  
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }  
        /* 'overflow: auto' allows both horizontal and vertical scrolling */
        html{
            overflow-x: auto;
        }
        body { background-color: #f7f9fa; color: #333; padding-bottom: 80px; min-height: 100vh; overflow-x: auto; 
        min-width: 800px;}
          
        header { background-color: #ffffff; display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }  
        .logo { font-size: 1.5rem; font-weight: bold; }  
        .logo span { color: #2abb0d; }  
        .btn-primary { background-color: #2abb0d; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; }  
        .btn-primary:hover { background-color: #0b0c0c; }  
        .search-container { text-align: center; padding: 3rem 1rem 2rem 1rem; }  
        .search-container h1 { margin-bottom: 1.5rem; font-size: 2rem; }  
        .search-bar { display: flex; justify-content: center; gap: 10px; max-width: 600px; margin: 0 auto; }  
        .search-bar input, .search-bar select { padding: 0.8rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }  
        .search-bar input { flex: 2; }  
        .search-bar select { flex: 1; }  
        .form-container { max-width: 600px; margin: 0 auto 2rem auto; background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }  
        .form-container h2 { margin-bottom: 1rem; font-size: 1.25rem; }  
        .form-group { margin-bottom: 1rem; }  
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; font-size: 0.9rem; }  
        .form-group input, .form-group select { width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px; }  
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; padding: 2rem 5%; width: 100%; }  
        .product-card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }  
        .product-card:hover { transform: translateY(-5px); }  
        .product-image { width: 100%; height: 180px; background-color: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 3rem; }  
        .clickable-image { cursor: pointer; transition: opacity 0.2s; }  
        .clickable-image:hover { opacity: 0.85; }  
        .product-info { padding: 1rem; }  
        .product-price { font-size: 1.25rem; font-weight: bold; color: #171817; margin-bottom: 0.5rem; }  
        .product-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }  
        .product-location { font-size: 0.85rem; color: #6b7280; }  
        .btn-delete { background-color: #2abb0d; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 4px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-top: 0.75rem; width: 100%; }  
        .btn-delete:hover { background-color: #0e0d0d; }  
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }  
        .modal-content { margin: auto; display: block; max-width: 90%; max-height: 90vh; margin-top: 5vh; border-radius: 8px; object-fit: contain; }  
        .close-modal { position: absolute; top: 20px; right: 35px; color: #f1f1f1; font-size: 40px; font-weight: bold; cursor: pointer; transition: 0.3s; }  
        .close-modal:hover, .close-modal:focus { color: #2abb0d; text-decoration: none; cursor: pointer; }  
        .branding-footer { background-color: #2abb0d; color: white; text-align: center; padding: 1.5rem 1rem; width: 100%; margin-top: 3rem; font-size: 0.9rem; font-weight: 600; line-height: 1.5; }  
        .branding-footer a { color: white; text-decoration: underline; }
        .back-to-top { position: fixed; bottom: 20px; right: 20px; background-color: #2abb0d; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 1.25rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: none; justify-content: center; align-items: center; z-index: 999; transition: background-color 0.2s, transform 0.2s; }
        .back-to-top:hover { background-color: #0b0c0c; transform: scale(1.05); }
    </style>  
</head>  
<body>  
    <header>  
        <div class="logo">🏫 Kibabii<span> CampusMarket</span></div>  
        <nav style="display: flex; gap: 10px;">
            <button class="btn-primary" id="toggleFormBtn" data-mode="product">Post an Item</button>
            <button class="btn-primary" id="toggleServiceBtn" style="background-color: #141616;" data-mode="service">Advertise Service</button>
        </nav>  
    </header>
   <main>  
        <section class="search-container">  
            <h1>Find what you need on campus</h1>  
            <div class="search-bar">  
                <input type="text" id="searchInput" placeholder="Search textbooks, electronics, locations, professions...">  
                <select id="categoryFilter">  
                    <option value="all">All Categories</option>  
                    <option value="textbooks">Textbooks</option>  
                    <option value="electronics">Electronics</option>  
                    <option value="housing">Dorm/Hostel Gear</option>  
                    <option value="furniture">Furniture</option>  
                    <option value="clothes">Clothes</option>  
                    <option value="foodstuff">Foodstuff</option>  
                    <option value="services">All Services</option>
                    <option value="services-plumbing">🔧 Plumbing Services</option>
                    <option value="services-salon">💇 Salon & Grooming</option>
                    <option value="services-carpentry">🔨 Carpentry & Repair</option>
                    <option value="services-tutoring">📚 Tutoring & Academics</option>
                    <option value="services-tech">💻 Tech & Repair Support</option>
                    <option value="services-errands">🏃 Errands & Delivery</option>
                    <option value="services-other">💼 Other Services</option>
                    <option value="other">Other</option>  
                </select>  
            </div>  
        </section>  
        <section class="form-container" id="formWrapper">  
            <h2>List Your Item For Sale</h2>  
            <form id="itemForm">  
                <div class="form-group"><label for="itemTitle">Item Title / Name</label><input type="text" id="itemTitle" required placeholder="e.g., Calculus 8th Edition"></div>  
                <div class="form-group"><label for="itemPrice">Price</label><input type="text" id="itemPrice" required placeholder="e.g., 1,500"></div>  
                <div class="form-group">  
                    <label for="itemCategory">Category</label>  
                    <!-- Options are now dynamically generated by Javascript depending on the mode -->
                    <select id="itemCategory">  
                        <option value="textbooks">Textbooks</option>  
                        <option value="electronics">Electronics</option>  
                        <option value="housing">Dorm/Hostel Gear</option>  
                        <option value="furniture">Furniture</option>  
                        <option value="clothes">Clothes</option>  
                        <option value="foodstuff">Foodstuff</option>  
                        <option value="other">Other</option>  
                    </select>  
                </div>  
                <div class="form-group"><label for="itemLocation">Pickup Location / Hostel</label><input type="text" id="itemLocation" required placeholder="e.g., Hostel A Room 12"></div>  
                <div class="form-group"><label for="itemImage">Upload Item Photo</label><input type="file" id="itemImage" accept="image/*"></div>  
                <div class="form-group" style="background: #2abb0d; padding: 1rem; border-radius: 6px; border: 1px solid #bfdbfe; margin-top: 1rem;">  
                    <p style="font-size: 0.85rem; color: #fff; font-weight: bold; margin-bottom: 0.3rem;">🎁 Your 1st standard listing is 100% FREE!</p>  
                    <p style="font-size: 0.8rem; color: #fff; margin-bottom: 0.6rem;">Subsequent posts or Premium upgrades require a small fee.</p>  
                    <div style="margin-bottom: 0.8rem;">  
                        <label for="mpesaPhone" style="font-size: 0.85rem; color: white;">M-Pesa Phone Number</label>  
                        <input type="text" id="mpesaPhone" placeholder="0712345678" style="width: 100%; padding: 0.4rem; border: 1px solid #ccc; border-radius: 4px;">  
                    </div>  
                    <div style="display: flex; align-items: center; gap: 10px; background: #e6e218; padding: 0.5rem; border-radius: 4px;">  
                        <input type="checkbox" id="premiumCheckbox" style="width: auto; cursor: pointer;">  
                        <label for="premiumCheckbox" style="margin-bottom: 0; cursor: pointer; font-size: 0.85rem; font-weight: 600;">🔥 Upgrade to Premium Position</label>  
                    </div>  
                </div>  
                <button type="submit" class="btn-primary" style="width: 100%;">Submit Listing</button>  
            </form>  
        </section>  
        <section class="market-grid" id="productGrid"></section>  
    </main>  
    
    <footer class="branding-footer">
        <p>Made by Lewis Ochoro</p>
        <p>WhatsApp number: <a href="https://wa.me/254710403679" target="_blank">0710403679</a></p>
    </footer>

    <div id="imageModal" class="modal">  
        <span class="close-modal">&times;</span>  
        <img class="modal-content" id="enlargedImg">  
    </div>
    <button class="back-to-top" id="scrollTopBtn" title="Go to top">▲</button>
   <script>  
        const productGrid = document.getElementById('productGrid');  
        const formWrapper = document.getElementById('formWrapper');  
        const itemForm = document.getElementById('itemForm');  
        const toggleFormBtn = document.getElementById('toggleFormBtn');  
        const toggleServiceBtn = document.getElementById('toggleServiceBtn');
        const activeUserToken = sessionStorage.getItem('market_user_token');  
        const loggedInUser = sessionStorage.getItem('market_username');  
        
        let currentFormMode = 'product'; 

        // Dynamic Categories Configuration
        const productCategories = [
            { value: 'textbooks', text: 'Textbooks' },
            { value: 'electronics', text: 'Electronics' },
            { value: 'housing', text: 'Dorm/Hostel Gear' },
            { value: 'furniture', text: 'Furniture' },
            { value: 'clothes', text: 'Clothes' },
            { value: 'foodstuff', text: 'Foodstuff' },
            { value: 'other', text: 'Other' }
        ];

        const serviceCategories = [
            { value: 'services-plumbing', text: '🔧 Plumbing Services' },
            { value: 'services-salon', text: '💇 Salon & Grooming' },
            { value: 'services-carpentry', text: '🔨 Carpentry & Repair' },
            { value: 'services-tutoring', text: '📚 Tutoring & Academics' },
            { value: 'services-tech', text: '💻 Tech & Repair Support' },
            { value: 'services-errands', text: '🏃 Errands & Delivery' },
            { value: 'services-other', text: '💼 Other Professional Services' }
        ];

        // Modal Elements  
        const modal = document.getElementById("imageModal");  
        const modalImg = document.getElementById("enlargedImg");  
        const closeModalSpan = document.getElementsByClassName("close-modal")[0];  
        
        // Enforce login  
        if (!activeUserToken) window.location.href = 'auth.html';  
        
        // 1. Display Products and handle WhatsApp logic  
        function displayProducts(items) {  
            productGrid.innerHTML = "";  
            if (!items || items.length === 0) {  
                productGrid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:#6b7280; padding:2rem;">No items found.</p>`;  
                return;  
            }  
            items.forEach(product => {  
                const card = document.createElement('div');  
                card.className = 'product-card';  
                
                card.setAttribute('data-category', product.category || 'other');
                  
                // Clean phone number for WhatsApp  
                let phone = (product.phone || "254700000000").replace(/\D/g, '');  
                if (phone.startsWith('0')) phone = '254' + phone.substring(1);  
                else if (phone.startsWith('7') || phone.startsWith('1')) phone = '254' + phone;  
                
                // Format price  
                const cleanPrice = product.price.toString().replace(/ksh\s*/i, '').trim();  
                
                // Set default image icons  
                const isService = product.category && product.category.startsWith('services-');
                const defaultEmoji = isService ? '💼' : '📦';

                // Fixed: Utilizing direct URL params (encodeURIComponent) via <a> tag instead of <form>
                const messageType = isService ? "service" : "item";
                const waText = encodeURIComponent(`Hi! I saw your ${messageType} (${product.title}) on CampusMarket. Is it still available?`);

                card.innerHTML = `  
                    ${product.image ? `<img src="${product.image}" class="clickable-image" onclick="openModal('${product.image}')" style="width:100%; height:180px; object-fit:cover;">` : `<div class="product-image">${defaultEmoji}</div>`}  
                    <div class="product-info">  
                        <div class="product-price">KSh ${cleanPrice}</div>  
                        <div class="product-title">${product.title} ${product.isPremium ? '🔥' : ''}</div>  
                        <div class="product-location">📍 ${product.location}</div>  
                        <span style="font-size:0.75rem; color:#9ca3af; display:block; margin:0.25rem 0;">Seller: ${product.username || 'unknown'}</span>  
                        
                        <a href="https://wa.me/${phone}?text=${waText}" target="_blank" class="btn-primary" style="display:block; text-align:center; text-decoration:none; background-color:#22c55e; margin-top:0.5rem; width:100%;">
                            💬 Chat on WhatsApp
                        </a>  
                        
                        ${product.username === loggedInUser ? `<button class="btn-delete" onclick="deleteProduct('${product._id}')">Delete Listing</button>` : ''}  
                    </div>  
                `;  
                productGrid.appendChild(card);  
            });  
            filterCatalog();
        }  
        
        // Modal Functions  
        function openModal(imageSrc) {  
            modal.style.display = "block";  
            modalImg.src = imageSrc;  
        }  
        closeModalSpan.onclick = function() {  
            modal.style.display = "none";  
        }  
        window.onclick = function(event) {  
            if (event.target == modal) {  
                modal.style.display = "none";  
            }  
        } 

       // 2. Fetch data  
        function fetchProducts() {  
            fetch('/api/items')  
                .then(res => res.json())  
                .then(data => displayProducts(data.items || []))  
                .catch(err => console.error("Fetch Error:", err));  
        }  
        
        // Helper function to handle submission payload  
        function sendPayload(imageData) {  
            const payload = {   
                title: document.getElementById('itemTitle').value,   
                price: document.getElementById('itemPrice').value,   
                category: document.getElementById('itemCategory').value,   
                location: document.getElementById('itemLocation').value,   
                image: imageData,   
                isPremium: document.getElementById('premiumCheckbox').checked,   
                phone: document.getElementById('mpesaPhone').value   
            };  
            fetch('/api/items', {  
                method: 'POST',  
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${activeUserToken}` },  
                body: JSON.stringify(payload)  
            })  
            .then(res => res.json())  
            .then(data => {  
                alert(data.message || "Listed successfully!");  
                fetchProducts();  
                closeForm();
            })  
            .catch(err => alert("Submission failed."));  
        }  
        
        // 3. Submit Form  
        itemForm.addEventListener('submit', (e) => {  
            e.preventDefault();  
            const file = document.getElementById('itemImage').files[0];  
              
            if (file) {  
                const reader = new FileReader();  
                reader.onload = (event) => {  
                    const img = new Image();  
                    img.onload = () => {  
                        const MAX_WIDTH = 600;  
                        const MAX_HEIGHT = 600;  
                        let width = img.width;  
                        let height = img.height;  
                        if (width > height) {  
                            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }  
                        } else {  
                            if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }  
                        }  
                        const canvas = document.createElement('canvas');  
                        canvas.width = width;  
                        canvas.height = height;  
                        const ctx = canvas.getContext('2d');  
                        ctx.drawImage(img, 0, 0, width, height);  
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.5);  
                        sendPayload(compressedDataUrl);  
                    };  
                    img.src = event.target.result;  
                };  
                reader.readAsDataURL(file);  
            } else {  
                sendPayload(null);  
            }  
        });  
        
        // 4. Form Utility Management System  
        function openForm(mode) {
            currentFormMode = mode;
            formWrapper.style.display = 'block';
            
            toggleFormBtn.textContent = 'Post an Item';  
            toggleFormBtn.style.backgroundColor = '#2abb0d';  
            toggleServiceBtn.textContent = 'Advertise Service';  
            toggleServiceBtn.style.backgroundColor = '#0284c7';  

            const categorySelect = document.getElementById('itemCategory');
            categorySelect.innerHTML = ''; // Clear current categories entirely
            
            // Build strictly relevant dropdown options
            const optionsToLoad = mode === 'product' ? productCategories : serviceCategories;
            optionsToLoad.forEach(cat => {
                const optEl = document.createElement('option');
                optEl.value = cat.value;
                optEl.textContent = cat.text;
                categorySelect.appendChild(optEl);
            });

            if (mode === 'product') {
                document.querySelector('#formWrapper h2').textContent = 'List Your Item For Sale';  
                document.querySelector('label[for="itemTitle"]').textContent = 'Item Title / Name';  
                document.getElementById('itemTitle').placeholder = 'e.g., Calculus 8th Edition';  
                document.querySelector('label[for="itemPrice"]').textContent = 'Price';  
                document.getElementById('itemPrice').placeholder = 'e.g., 1,500';  
                document.querySelector('label[for="itemLocation"]').textContent = 'Pickup Location / Hostel';  
                document.getElementById('itemLocation').placeholder = 'e.g., Hostel A Room 12';  
                
                toggleFormBtn.textContent = 'Cancel';  
                toggleFormBtn.style.backgroundColor = '#dc2626';  
            } else {
                document.querySelector('#formWrapper h2').textContent = 'Advertise Your Professional Service';  
                document.querySelector('label[for="itemTitle"]').textContent = 'Profession / Service Name';  
                document.getElementById('itemTitle').placeholder = 'e.g., Expert Plumber & Pipe Fixer';  
                document.querySelector('label[for="itemPrice"]').textContent = 'Service Fee / Base Rate';  
                document.getElementById('itemPrice').placeholder = 'e.g., 500 per job';  
                document.querySelector('label[for="itemLocation"]').textContent = 'Service Operation Base / Hostel Room';  
                document.getElementById('itemLocation').placeholder = 'e.g., Off-Campus, Gate B / Hostel C Room 4';  
                
                toggleServiceBtn.textContent = 'Cancel';  
                toggleServiceBtn.style.backgroundColor = '#dc2626';  
            }
        }

        function closeForm() {
            formWrapper.style.display = 'none';  
            itemForm.reset();  
            toggleFormBtn.textContent = 'Post an Item';  
            toggleFormBtn.style.backgroundColor = '#2abb0d';  
            toggleServiceBtn.textContent = 'Advertise Service';  
            toggleServiceBtn.style.backgroundColor = '#0284c7';  
        }

        toggleFormBtn.addEventListener('click', () => {  
            if (formWrapper.style.display === 'block' && currentFormMode === 'product') {  
                closeForm();  
            } else {  
                openForm('product');  
            }  
        });  

        toggleServiceBtn.addEventListener('click', () => {  
            if (formWrapper.style.display === 'block' && currentFormMode === 'service') {  
                closeForm();  
            } else {  
                openForm('service');  
            }  
        });  
        
        function deleteProduct(id) {  
            if(confirm("Delete this listing?")) {  
                fetch(`/api/items?id=${id}`, { method: 'DELETE', headers: {'Authorization': `Bearer ${activeUserToken}`} })  
                .then(() => fetchProducts());  
            }  
        }  
        
        // 5. Intelligent Dynamic Frontend Search Filtering System  
        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');

        function filterCatalog() {
            const searchWord = searchInput.value.toLowerCase().trim();
            const selectedCategory = categoryFilter.value;
            const allProductCards = document.querySelectorAll('.product-card');

            allProductCards.forEach(card => {
                const titleText = card.querySelector('.product-title').textContent.toLowerCase();
                const locationText = card.querySelector('.product-location').textContent.toLowerCase();
                const cardCategory = card.getAttribute('data-category') || '';

                const matchesSearch = titleText.includes(searchWord) || locationText.includes(searchWord);
                
                let matchesCategory = false;
                if (selectedCategory === 'all') {
                    matchesCategory = true;
                } else if (selectedCategory === 'services') {
                    matchesCategory = cardCategory.startsWith('services-');
                } else {
                    matchesCategory = (cardCategory === selectedCategory);
                }

                if (matchesSearch && matchesCategory) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        searchInput.addEventListener('input', filterCatalog);
        categoryFilter.addEventListener('change', filterCatalog);

        // 6. Floating Back to Top Navigation Interface  
        const scrollTopBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                scrollTopBtn.style.display = 'flex';
            } else {
                scrollTopBtn.style.display = 'none';
            }
        });
        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        fetchProducts();  
    </script>  
</body>  
</html>
